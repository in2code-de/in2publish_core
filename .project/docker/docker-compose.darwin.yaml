services:
  local:
    image: in2code/httpd:2.4-alpine
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
    env_file:
      - .env
    environment:
      WEB_DOCUMENT_ROOT: /app/Build/local/public
      WEB_PHP_SERVICE: local-php
      VIRTUAL_HOST: ${HOST_LOCAL}
      VIRTUAL_PORT: 443
      VIRTUAL_PROTO: https
    networks:
      default:
        aliases:
          - ${HOST_LOCAL}
    working_dir: /app/Build/local/

  local-php:
    build:
      context: .project/docker/local-php
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    user: ${USER_ID:-1000}
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
      - $HOME/.composer/auth.json:/tmp/composer/auth.json:cached
      - $HOME/.composer/cache/:/tmp/composer/cache/:cached
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SQLDUMPSDIR}:/${SQLDUMPSDIR}:cached
    env_file:
      - .env
    environment:
      IN2PUBLISH_CONTEXT: Local
      TYPO3_INSTALL_DB_DBNAME: local
      TYPO3_INSTALL_SITE_NAME: "[LOCAL] CP TYPO3 v13"
      TYPO3_INSTALL_SITE_BASE_URL: ${HOST_LOCAL}
      HOST_PWD: $PWD
    working_dir: /app/Build/local/

  foreign:
    image: in2code/httpd:2.4-alpine
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
    env_file:
      - .env
    environment:
      WEB_DOCUMENT_ROOT: /app/Build/foreign/public
      WEB_PHP_SERVICE: foreign-php
      VIRTUAL_HOST: ${HOST_FOREIGN}
      VIRTUAL_PORT: 443
      VIRTUAL_PROTO: https
    networks:
      default:
        aliases:
          - ${HOST_FOREIGN}
    working_dir: /app/Build/foreign/

  foreign-php:
    build:
      context: .project/docker/foreign-php
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
      - $HOME/.composer/auth.json:/tmp/composer/auth.json:cached
      - $HOME/.composer/cache/:/tmp/composer/cache/:cached
    env_file:
      - .env
    environment:
      IN2PUBLISH_CONTEXT: Foreign
      TYPO3_INSTALL_DB_DBNAME: foreign
      TYPO3_INSTALL_SITE_NAME: "[FOREIGN] CP TYPO3 v13"
      TYPO3_INSTALL_SITE_BASE_URL: ${HOST_FOREIGN}
    working_dir: /app/Build/foreign/

  mysql:
    image: in2code/mysql:8.0
    user: '1000'
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
      - .project/docker/mysql/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
      - ${SQLDUMPSDIR}:/${SQLDUMPSDIR}
    ports:
      - ${SQLPORT}:3306

  mail:
    image: axllent/mailpit
    environment:
      VIRTUAL_HOST: ${MAIL_HOST}
      VIRTUAL_PORT: 8025

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    command: sleep infinity
    user: ${USER_ID:-1000}
    volumes:
      - ./:/work:cached
      - ${HOME}/.dinghy/certs/:/certs/:ro
    working_dir: /work
    env_file:
      - .env
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_BASE_URL: https://${HOST_LOCAL}/typo3/
      PLAYWRIGHT_FOREIGN_BASE_URL: https://${HOST_FOREIGN}/typo3/
      HOME: /work
      NODE_EXTRA_CA_CERTS: /certs/${HOST_LOCAL}.crt
      PLAYWRIGHT_DB_HOST: mysql
      PLAYWRIGHT_DB_PORT: 3306
    ports:
      - "${PLAYWRIGHT_UI_PORT:-9323}:9323"
    networks:
      default:
    depends_on:
      - local
      - foreign

volumes:
  mysql-data:
