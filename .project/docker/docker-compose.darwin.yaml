name: in2publish_core

services:
  local:
    image: in2code/httpd:2.4-alpine
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
    env_file:
      - .env
    environment:
      WEB_DOCUMENT_ROOT: /app/Build/local/public
      WEB_PHP_SERVICE: local-php
      VIRTUAL_HOST: ${HOST_LOCAL}
      VIRTUAL_PORT: 443
      VIRTUAL_PROTO: https
    networks:
      default:
        aliases:
          - ${HOST_LOCAL}
    working_dir: /app/Build/local/

  local-php:
    build:
      context: .project/docker/local-php
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    user: ${USER_ID:-1000}
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../.project/data/dumps:/${DUMPS_DIR}:cached
      - ../../.project/data/fileadmin/:/${FILEADMIN_DIR}:cached
    env_file:
      - .env
    environment:
      IN2PUBLISH_CONTEXT: Local
      TYPO3_INSTALL_DB_DBNAME: local
      TYPO3_INSTALL_SITE_NAME: "[LOCAL] CP TYPO3 v14"
      TYPO3_INSTALL_SITE_BASE_URL: ${HOST_LOCAL}
      HOST_PWD: $PWD
    working_dir: /app/Build/local/

  foreign:
    image: in2code/httpd:2.4-alpine
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
    env_file:
      - .env
    environment:
      WEB_DOCUMENT_ROOT: /app/Build/foreign/public
      WEB_PHP_SERVICE: foreign-php
      VIRTUAL_HOST: ${HOST_FOREIGN}
      VIRTUAL_PORT: 443
      VIRTUAL_PROTO: https
    networks:
      default:
        aliases:
          - ${HOST_FOREIGN}
    working_dir: /app/Build/foreign/

  foreign-php:
    build:
      context: .project/docker/foreign-php
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - ./:/app/:cached
      - ./:/packages/in2publish_core/:cached
    env_file:
      - .env
    environment:
      IN2PUBLISH_CONTEXT: Foreign
      TYPO3_INSTALL_DB_DBNAME: foreign
      TYPO3_INSTALL_SITE_NAME: "[FOREIGN] CP TYPO3 v14"
      TYPO3_INSTALL_SITE_BASE_URL: ${HOST_FOREIGN}
    working_dir: /app/Build/foreign/

  mysql:
    image: in2code/mysql:8.0
    command: --secure-file-priv=${DUMPS_DIR}
    user: '1000'
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
      - .project/docker/mysql/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
      - ../../.project/data/dumps:/${DUMPS_DIR}
    ports:
      - ${SQLPORT}:3306

  mail:
    image: axllent/mailpit
    environment:
      VIRTUAL_HOST: ${MAIL_HOST}
      VIRTUAL_PORT: 8025

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    command: sleep infinity
    user: ${USER_ID:-1000}
    volumes:
      - ./:/work:cached
      - ../../.project/data/dumps:/.project/data/dumps:cached
      - ../../.project/data/fileadmin/:/${FILEADMIN_DIR}:cached
    working_dir: /work
    env_file:
      - .env
    environment:
      CI: ${CI:-0}
      HOME: /work
      NODE_TLS_REJECT_UNAUTHORIZED: 0
      PLAYWRIGHT_BASE_URL: https://${HOST_LOCAL}/typo3/
      PLAYWRIGHT_FOREIGN_BASE_URL: https://${HOST_FOREIGN}/typo3/
      DUMPS_DIR: /.project/data/dumps
      FILEADMIN_DIR: /.project/data/fileadmin
      LOCAL_FILEADMIN_DIR: /work/Build/local/public/fileadmin
      FOREIGN_FILEADMIN_DIR: /work/Build/foreign/public/fileadmin
      LOCAL_CACHE_DIR: /work/Build/local/var/cache
      FOREIGN_CACHE_DIR: /work/Build/foreign/var/cache
    ports:
      - "${PLAYWRIGHT_UI_PORT:-9425}:9323"
    networks:
      default:
        aliases:
          - playwright

volumes:
  mysql-data:
